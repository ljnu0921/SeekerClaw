name: Build

on:
  push:
    branches: [main]
  pull_request:
    # Run on PRs to ANY branch, not just main. Feature branches and
    # integration branches need the same protection — schema bugs that
    # land on a feature branch propagate forward at merge time.
    branches: ['**']

jobs:
  # Fast Node-only checks — run first, fail fast, no JDK / Gradle / SDK
  # needed. Catches the class of bug that takes down the agent on the
  # wire (invalid tool input_schema) without waiting for the ~5-minute
  # APK build.
  #
  # See BAT-664 device-test incident 2026-05-12: agent_pay's body schema
  # declared type union including 'array' without 'items', the Anthropic
  # API rejected the entire toolset, and EVERY agent turn failed. The
  # bug shipped through Copilot review + validate-detect + validate-settle
  # + 6 live on-chain payments because none of those exercise the actual
  # model API. The schema test below is the wire-level safety net.
  node-tests:
    name: Node tests (input_schema + smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Pin to Node 18 LTS — matches the embedded nodejs-mobile runtime
          # on device (per CLAUDE.md "Node.js: 18 LTS"). Pre-fix this was
          # Node 20; Copilot review R1-2 flagged the drift risk (newer
          # syntax / APIs could pass CI and crash on-device). Keeping CI's
          # Node major aligned with production catches that class of bug.
          node-version: '18'

      - name: Validate tool input_schemas
        # Required check — a bad schema breaks ALL agent turns, not just
        # calls to the bad tool. Cheap to run (<1s), high blast radius.
        run: node tests/nodejs-project/tool-schemas.test.js

      - name: Node bundle smoke test
        # node --check on every .js + require() of side-effect-free modules.
        # Catches the BAT-489 RC5 class of bug (regex SyntaxError that
        # node --check passes but module-load eval throws on).
        run: node tests/nodejs-project/smoke.js

      # R-pr373-r6-2: financial-flow + confirmation-gate tests gated in CI.
      # Pre-fix, these only ran locally (or in pre-push for those who
      # remembered to run it). The agent_pay-* + wallet-registry + caps
      # + confirmation tests cover safety-critical wallet logic:
      # gating, cap enforcement, pre-flight balance check branches, POST
      # body validation, burner-status routing. Each is fast (<5s) and
      # they catch regressions that would otherwise only surface at
      # device-test time — too late.
      - name: Financial-flow + confirmation-gate tests
        run: |
          set -e
          for t in \
            agent-pay-no-burner \
            agent-pay-post \
            agent-pay-preflight-balance \
            burner-cancel-zero-amount \
            burner-signer \
            caps-preflight \
            confirmation-policy \
            confirmation-policy-burner \
            system-prompt-wallets \
            wallet-registry \
            wallet-set-caps-errors \
            x402 \
            x402-v2-tx
          do
            echo "── $t ──"
            node "tests/nodejs-project/${t}.test.js"
          done

  build:
    name: Android build (dappStore + googlePlay)
    runs-on: ubuntu-latest
    needs: node-tests  # don't waste 5min of compile if Node checks fail

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APKs
        run: chmod +x gradlew && ./gradlew assembleDappStoreDebug assembleGooglePlayDebug

      - name: Upload debug APKs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: seekerclaw-debug
          path: app/build/outputs/apk/*/debug/*.apk
          retention-days: 14
